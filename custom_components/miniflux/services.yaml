# Service field definitions for the HA UI (chunk 5.4). Field keys here must
# exactly match custom_components/miniflux/services.py's FIELD_* constants.
#
# Schema/selectors only -- name/description text lives in strings.json's
# "services" key (chunk 8.2), matching current HA convention (hassfest flags
# a description present in both places as duplicated).

search_entries:
  fields:
    config_entry_id:
      required: false
      selector:
        text:
    category:
      required: false
      selector:
        text:
    feed:
      required: false
      selector:
        text:
    status:
      required: false
      selector:
        select:
          options: ["unread", "read", "removed"]
          multiple: true
    starred:
      required: false
      selector:
        boolean:
    search:
      required: false
      selector:
        text:
    published_within:
      required: false
      selector:
        duration:
    published_after:
      required: false
      selector:
        datetime:
    published_before:
      required: false
      selector:
        datetime:
    order:
      required: false
      selector:
        text:
    direction:
      required: false
      selector:
        select:
          options: ["asc", "desc"]
    limit:
      required: false
      default: 100
      selector:
        number:
          min: 1
          max: 500
    include_content:
      required: false
      default: false
      selector:
        boolean:

count_entries:
  fields:
    config_entry_id:
      required: false
      selector:
        text:
    category:
      required: false
      selector:
        text:
    feed:
      required: false
      selector:
        text:
    status:
      required: false
      selector:
        select:
          options: ["unread", "read", "removed"]
          multiple: true
    starred:
      required: false
      selector:
        boolean:
    search:
      required: false
      selector:
        text:
    published_within:
      required: false
      selector:
        duration:
    published_after:
      required: false
      selector:
        datetime:
    published_before:
      required: false
      selector:
        datetime:

get_entries:
  fields:
    config_entry_id:
      required: false
      selector:
        text:
    entry_ids:
      required: true
      selector:
        object:
    include_content:
      required: false
